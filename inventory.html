<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Malta Vape</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .gold-text { color: #fbbf24; }
        .btn-gold { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: #020617; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
    </style>
</head>
<body class="pb-24">

    <div class="p-6 flex justify-between items-center">
        <div><h1 class="text-2xl font-black gold-text tracking-tighter uppercase italic">Daftar Menu</h1><p class="text-[10px] text-gray-500 uppercase" id="item-count">Loading...</p></div>
        <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-900 border border-slate-800 text-gray-500 text-xl">✕</a>
    </div>

    <div class="px-6 mb-6 flex gap-2">
        <input type="text" id="invSearch" onkeyup="renderInventory()" placeholder="Cari item..." class="flex-1 p-4 rounded-2xl text-xs outline-none glass-card border-none">
        <button onclick="toggleForm()" class="w-14 h-14 btn-gold rounded-2xl flex items-center justify-center shadow-lg"><span id="toggle-icon" class="text-xl">+</span></button>
    </div>

    <div id="form-container" class="px-6 overflow-hidden max-h-0 transition-all mb-0">
        <div class="glass-card p-6 rounded-[2.5rem] border border-amber-500/20 mb-6">
            <div class="space-y-3">
                <input type="text" id="nama" placeholder="Nama Produk" class="w-full p-4 rounded-xl text-xs">
                <div class="grid grid-cols-2 gap-2">
                    <select id="kategori" class="p-4 rounded-xl text-xs font-bold"><option value="POD">POD</option><option value="MOD">MOD</option><option value="LIQUID">LIQUID</option><option value="CARTRIDGE">CARTRIDGE</option><option value="OTHER">OTHER</option></select>
                    <input type="text" id="merk" placeholder="Merk" class="w-full p-4 rounded-xl text-xs">
                </div>
                <input type="number" id="harga" placeholder="Harga Jual (Rp)" class="w-full p-4 rounded-xl text-xs">
                <button onclick="simpanItem()" class="w-full btn-gold py-4 rounded-2xl font-black text-xs uppercase shadow-lg">Simpan Menu</button>
            </div>
        </div>
    </div>

    <div class="px-6 space-y-3" id="inventory-list"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzVgkW4y0ke_7AFPiALhnoMN577ixX2eZSaxmucn-amXbRUoZ3xi4hSZZ54vmT6abEm/exec";
        let inventoryData = [];

        async function fetchInventory() {
            try {
                const resp = await fetch(API_URL + "?page=items&_ts=" + Date.now());
                inventoryData = await resp.json();
                renderInventory();
            } catch (e) { }
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list'), search = document.getElementById('invSearch').value.toLowerCase();
            list.innerHTML = '';
            const filtered = inventoryData.filter(i => i.nama.toLowerCase().includes(search) || i.merk.toLowerCase().includes(search));
            document.getElementById('item-count').innerText = `${filtered.length} Produk Terdaftar`;
            filtered.reverse().forEach(item => {
                list.innerHTML += `
                    <div class="glass-card p-5 rounded-[2.2rem] flex justify-between items-center">
                        <div><p class="text-[8px] font-bold text-amber-500 uppercase">${item.merk}</p><h3 class="text-xs font-bold">${item.nama}</h3><p class="text-[10px] text-gray-500 font-bold mt-1">Rp ${parseInt(item.harga).toLocaleString()}</p></div>
                        <button onclick="hapusItem('${item.id}', '${item.nama}')" class="text-rose-900/40 p-2"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4zM6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12z"/></svg></button>
                    </div>`;
            });
        }

        async function hapusItem(id, nama) { if(confirm(`Hapus ${nama}?`)) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ target: 'items', action: 'DELETE', id: id }) }); fetchInventory(); } }
        function toggleForm() { const c = document.getElementById('form-container'); c.style.maxHeight = (c.style.maxHeight === '0px' || !c.style.maxHeight) ? '500px' : '0px'; }
        async function simpanItem() {
            const data = [Date.now(), document.getElementById('nama').value, document.getElementById('kategori').value, '', document.getElementById('merk').value, 1, document.getElementById('harga').value];
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ target: 'items', data: data }) });
            fetchInventory(); toggleForm();
        }
        window.onload = fetchInventory;
    </script>
</body>
</html>
