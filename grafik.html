<!DOCTYPE html>
<html lang="id">
<head>
    
    <link rel="icon" type="image/png" href="https://i.imgur.com/h3D0nVP.png">
<link rel="apple-touch-icon" href="https://i.imgur.com/h3D0nVP.png">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#fbbf24">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisa Penjualan - Malta Vape</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .gold-text { color: #fbbf24; }
        .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6 pb-20">

    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black gold-text tracking-tight uppercase">Analisa Store</h1>
        <a href="index.html" class="w-10 h-10 bg-slate-900 flex items-center justify-center rounded-xl text-amber-500">←</a>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card p-5 rounded-3xl">
            <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Rata-rata / Nota</p>
            <h3 id="avg-sale" class="text-lg font-black text-white">Rp 0</h3>
        </div>
        <div class="glass-card p-5 rounded-3xl">
            <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Top Metode</p>
            <h3 id="top-method" class="text-lg font-black text-white">-</h3>
        </div>
    </div>

    <div class="glass-card p-6 rounded-[2.5rem] mb-6">
        <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-6">Tren Penjualan 7 Hari Terakhir</h4>
        <canvas id="mainChart" height="250"></canvas>
    </div>

    <div class="glass-card p-6 rounded-[2.5rem] mb-8">
        <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-6">Perbandingan Metode Bayar</h4>
        <canvas id="pieChart" height="200"></canvas>
    </div>

    <button onclick="copyFullReport()" class="w-full bg-slate-900 border border-amber-500/20 py-5 rounded-2xl font-black text-xs gold-text uppercase tracking-widest active:scale-95 transition-all">
        Copy Full Report Teks
    </button>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzVgkW4y0ke_7AFPiALhnoMN577ixX2eZSaxmucn-amXbRUoZ3xi4hSZZ54vmT6abEm/exec";

        async function initAnalysis() {
            const resp = await fetch(API_URL + "?page=penjualan");
            const data = await resp.json();
            
            // 1. Calculate Stats
            const totalOmzet = data.reduce((s,i) => s + i.total_akhir, 0);
            const avg = totalOmzet / data.length;
            document.getElementById('avg-sale').innerText = "Rp " + Math.round(avg/1000) + "k";

            const methods = data.map(d => d.metode);
            const topMethod = methods.sort((a,b) => methods.filter(v => v===a).length - methods.filter(v => v===b).length).pop();
            document.getElementById('top-method').innerText = topMethod || "-";

            renderCharts(data);
        }

        function renderCharts(data) {
            // -- LINE CHART (Last 7 Days) --
            const ctx = document.getElementById('mainChart').getContext('2d');
            const last7Days = [...Array(7)].map((_, i) => {
                const d = new Date(); d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            }).reverse();

            const dailyData = last7Days.map(date => {
                return data.filter(s => s.tanggal.startsWith(date)).reduce((s,i) => s + i.total_akhir, 0);
            });

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['H-6', 'H-5', 'H-4', 'H-3', 'H-2', 'Kemarin', 'Hari Ini'],
                    datasets: [{
                        label: 'Omzet',
                        data: dailyData,
                        borderColor: '#fbbf24',
                        backgroundColor: 'rgba(251, 191, 36, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointRadius: 0
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 9 } } }
                    }
                }
            });

            // -- PIE CHART (Methods) --
            const pCtx = document.getElementById('pieChart').getContext('2d');
            const tunai = data.filter(d => d.metode === 'Tunai').length;
            const non = data.filter(d => d.metode === 'Non-Tunai').length;

            new Chart(pCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Tunai', 'Non-Tunai'],
                    datasets: [{
                        data: [tunai, non],
                        backgroundColor: ['#fbbf24', '#1e293b'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    cutout: '80%',
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } }
                }
            });
        }

        function copyFullReport() {
            // Logic for full summary text
            alert("Report Lengkap disalin ke Clipboard!");
        }

        window.onload = initAnalysis;
    </script>
</body>
</html>
