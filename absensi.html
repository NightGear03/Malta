<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Malta Vape</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-gold { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: #020617; }
        .modal-container { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(2, 6, 23, 0.98); padding: 20px; flex-direction: column; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; width: 85%; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6 pb-24">

    <div id="toast" class="toast glass px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 border-amber-500/30">
        <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center bg-amber-500/10 text-xs">⏳</div>
        <p id="toast-msg" class="text-[10px] font-bold uppercase tracking-widest text-amber-500"></p>
    </div>

    <div class="flex items-center justify-between mb-8">
        <a href="index.html" class="w-10 h-10 glass rounded-full flex items-center justify-center text-amber-500">←</a>
        <div class="text-center">
            <h1 class="text-[10px] font-black text-amber-500 uppercase tracking-[0.3em]">Presensi Kerja</h1>
            <p class="text-[8px] text-gray-500 font-bold uppercase">Malta Vape Store</p>
        </div>
        <div class="w-10"></div>
    </div>

    <div class="glass p-8 rounded-[2.5rem] text-center mb-8 border-amber-500/20 border-2 shadow-2xl">
        <h2 id="live-clock" class="text-5xl font-black mb-2 tracking-tighter text-white">00:00:00</h2>
        <p id="live-date" class="text-[10px] text-gray-500 uppercase font-bold tracking-[0.3em]"></p>
    </div>

    <div class="space-y-3 mb-8">
        <button onclick="handleAbsen('MASUK')" class="w-full py-5 bg-emerald-600 rounded-3xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all shadow-lg shadow-emerald-900/20">
            <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span> Mulai Kerja (Check-In)
        </button>
        <button onclick="handleAbsen('PULANG')" class="w-full py-5 bg-rose-600 rounded-3xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all shadow-lg shadow-rose-900/20">
            <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span> Selesai Kerja (Check-Out)
        </button>
        <button onclick="handleAbsen('LIBUR')" class="w-full py-5 bg-sky-600 rounded-3xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all">
            💤 Set Status Libur
        </button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass p-5 rounded-3xl border-b-2 border-emerald-500/30">
            <p class="text-[8px] text-gray-500 font-bold uppercase mb-1 tracking-wider">Hadir Hari Ini</p>
            <h3 id="stat-masuk" class="text-xl font-black">0 Hari</h3>
        </div>
        <div class="glass p-5 rounded-3xl border-b-2 border-sky-500/30">
            <p class="text-[8px] text-gray-500 font-bold uppercase mb-1 tracking-wider">Total Libur</p>
            <h3 id="stat-libur" class="text-xl font-black">0 Hari</h3>
        </div>
    </div>

    <div class="flex justify-between items-center mb-4 px-2">
        <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Riwayat Terakhir</h3>
        <button onclick="openHistoryModal()" class="text-[10px] font-bold text-amber-500 uppercase bg-amber-500/10 px-3 py-1 rounded-full">Lihat Semua ↓</button>
    </div>
    <div id="history-list" class="space-y-3">
        <div class="text-center py-10 opacity-30 text-[10px] italic">Mengambil data dari cloud...</div>
    </div>

    <div id="camera-modal" class="modal-container items-center justify-center">
        <div class="w-full max-w-sm glass rounded-[3rem] overflow-hidden border-2 border-amber-500/20">
            <video id="video" class="w-full bg-black h-80 object-cover" autoplay playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div class="p-8 text-center bg-slate-900">
                <p class="text-[10px] text-amber-500 font-bold uppercase mb-6 tracking-widest">Ambil Bukti Foto Toko</p>
                <div class="flex gap-4">
                    <button onclick="closeCamera()" class="flex-1 py-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase tracking-wider">Batal</button>
                    <button id="snap-btn" onclick="takeSnap()" class="flex-1 py-4 btn-gold rounded-2xl text-[10px] font-black uppercase tracking-widest">Jepret</button>
                </div>
            </div>
        </div>
    </div>

    <div id="photo-modal" class="modal-container items-center justify-center bg-black/95" onclick="this.style.display='none'">
        <div class="w-full max-w-xs overflow-hidden rounded-[3rem] border-2 border-amber-500/50">
            <img id="view-img" src="" class="w-full h-auto">
        </div>
        <p class="mt-6 text-[10px] font-bold text-gray-500 uppercase tracking-widest">Ketuk dimana saja untuk tutup</p>
    </div>

    <div id="history-modal" class="modal-container">
        <div class="flex justify-between items-center mb-8 mt-4">
            <div>
                <h2 class="text-2xl font-black text-amber-500 uppercase italic">Rekap Data</h2>
                <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">Malta Vape Presence Log</p>
            </div>
            <button onclick="closeHistoryModal()" class="w-12 h-12 glass rounded-full flex items-center justify-center text-xl">✕</button>
        </div>
        <div id="full-history-content" class="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-20"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzVgkW4y0ke_7AFPiALhnoMN577ixX2eZSaxmucn-amXbRUoZ3xi4hSZZ54vmT6abEm/exec";
        let currentStatus = "";
        let stream = null;
        let allData = [];

        // --- FUNGSI FIX DATE & TIME (Pembersih Data) ---
        function formatDisplay(val, type) {
            if (!val || val === "-" || val === "null" || val === "") return "-";
            
            // Cek jika val mengandung format ISO/Date dari Google
            if (val.toString().includes('T') || val.toString().includes('GMT')) {
                const d = new Date(val);
                if (isNaN(d.getTime())) return val; // Jika gagal parse, balikkan aslinya
                
                if (type === 'jam') {
                    // Pakai jam dari string aslinya untuk menghindari timezone shift
                    return d.getHours().toString().padStart(2, '0') + "." + d.getMinutes().toString().padStart(2, '0');
                }
                if (type === 'tgl') {
                    return d.toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit', year:'numeric'});
                }
            }
            return val;
        }

        // --- UI UTILS ---
        function showToast(msg, type = "info") {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerHTML = type === 'success' ? '✅' : '⏳';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('live-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);

        // --- CORE LOGIC ---
        function handleAbsen(status) {
            currentStatus = status;
            if (status === 'LIBUR') {
                if(confirm("Konfirmasi set status LIBUR?")) submitAbsen("");
            } else {
                openCamera();
            }
        }

        async function openCamera() {
            document.getElementById('camera-modal').style.display = 'flex';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                document.getElementById('video').srcObject = stream;
            } catch (e) {
                showToast("Akses Kamera Gagal", "error");
                closeCamera();
            }
        }

        function closeCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('camera-modal').style.display = 'none';
        }

        function takeSnap() {
            const btn = document.getElementById('snap-btn');
            btn.innerText = "SABAR..."; btn.disabled = true;
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.width = 480; canvas.height = 640;
            canvas.getContext('2d').drawImage(video, 0, 0, 480, 640);
            const base64 = canvas.toDataURL('image/jpeg', 0.5);
            closeCamera();
            btn.innerText = "JEPRET"; btn.disabled = false;
            submitAbsen(base64);
        }

        async function submitAbsen(foto) {
            showToast("Mengirim Ke Cloud...", "info");
            const now = new Date();
            const jam = now.getHours().toString().padStart(2, '0') + "." + now.getMinutes().toString().padStart(2, '0');
            const tgl = now.toLocaleDateString('id-ID', { day:'2-digit', month:'2-digit', year:'numeric' });
            
            const payload = {
                target: "absensi", action: "APPEND",
                data: [Date.now(), tgl, currentStatus === 'MASUK' ? jam : "-", currentStatus === 'PULANG' ? jam : "-", currentStatus, foto]
            };

            try {
                const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const res = await resp.json();
                if(res.status === 'ok') {
                    showToast("Presensi Berhasil!", "success");
                    loadHistory();
                }
            } catch (e) { showToast("Gagal Simpan Data", "error"); }
        }

        async function loadHistory() {
            try {
                const resp = await fetch(API_URL + "?page=absensi");
                allData = await resp.json();
                
                const uniqueDates = [...new Set(allData.filter(d => d.status === 'MASUK').map(d => d.tanggal))];
                document.getElementById('stat-masuk').innerText = uniqueDates.length + " Hari";
                document.getElementById('stat-libur').innerText = allData.filter(d => d.status === 'LIBUR').length + " Hari";

                renderItems(allData.slice(-3).reverse(), 'history-list');
            } catch (e) { console.log("Fetch failed"); }
        }

        function renderItems(data, targetId) {
            const container = document.getElementById(targetId);
            if(!data || data.length === 0) {
                container.innerHTML = '<div class="py-10 text-center opacity-30 text-[10px]">Data Belum Tersedia</div>';
                return;
            }
            container.innerHTML = '';
            data.forEach(item => {
                let col = item.status === 'MASUK' ? 'emerald' : (item.status === 'LIBUR' ? 'sky' : 'rose');
                
                // BERSIHKAN DATA DISINI
                const rawJam = item.status === 'MASUK' ? item.jam_masuk : (item.status === 'PULANG' ? item.jam_keluar : '-');
                const jam = formatDisplay(rawJam, 'jam');
                const tgl = formatDisplay(item.tanggal, 'tgl');

                container.innerHTML += `
                <div class="glass p-5 rounded-[2.5rem] flex justify-between items-center border-l-4 border-${col}-500 shadow-xl mb-3">
                    <div class="flex items-center gap-4">
                        <div class="w-1.5 h-10 bg-${col}-500 rounded-full"></div>
                        <div>
                            <p class="text-[8px] text-gray-400 font-bold uppercase tracking-wider">${tgl}</p>
                            <h4 class="text-[11px] font-black uppercase text-white tracking-widest">${item.status}</h4>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black text-${col}-400">${jam}</p>
                        ${item.foto && item.foto.length > 100 ? `<button onclick="viewPhoto('${item.foto}')" class="text-[7px] text-amber-500 font-black mt-2 bg-amber-500/10 px-3 py-1.5 rounded-full border border-amber-500/20 active:bg-amber-500 active:text-slate-900 uppercase">📸 View Proof</button>` : ''}
                    </div>
                </div>`;
            });
        }

        function viewPhoto(img) {
            document.getElementById('view-img').src = img;
            document.getElementById('photo-modal').style.display = 'flex';
        }

        function openHistoryModal() {
            document.getElementById('history-modal').style.display = 'flex';
            renderItems(allData.slice().reverse(), 'full-history-content');
        }

        function closeHistoryModal() {
            document.getElementById('history-modal').style.display = 'none';
        }

        window.onload = () => { updateClock(); loadHistory(); };
    </script>
</body>
</html>
