<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Malta Vape</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-checkin { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-checkout { background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%); }
        #camera-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body class="p-6">

    <div class="flex items-center justify-between mb-8">
        <a href="index.html" class="w-10 h-10 glass rounded-full flex items-center justify-center text-amber-500">←</a>
        <div class="text-center">
            <h1 class="text-sm font-black text-amber-500 uppercase tracking-widest">Presensi Kerja</h1>
            <p class="text-[10px] text-gray-500">MALTA VAPE STORE</p>
        </div>
        <div class="w-10"></div>
    </div>

    <div class="glass p-10 rounded-[2.5rem] text-center mb-8 border-amber-500/20 border-2">
        <h2 id="live-clock" class="text-5xl font-black mb-2 tracking-tighter">00:00:00</h2>
        <p id="live-date" class="text-xs text-gray-500 uppercase font-bold tracking-[0.2em]"></p>
    </div>

    <div class="space-y-4 mb-10">
        <button onclick="openCamera('MASUK')" class="btn-checkin w-full py-5 rounded-3xl font-black text-xs uppercase tracking-widest shadow-lg shadow-emerald-500/20 flex items-center justify-center gap-3">
            <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span> Mulai Kerja (Check-In)
        </button>
        <button onclick="openCamera('PULANG')" class="btn-checkout w-full py-5 rounded-3xl font-black text-xs uppercase tracking-widest shadow-lg shadow-rose-500/20 flex items-center justify-center gap-3">
            <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span> Selesai Kerja (Check-Out)
        </button>
    </div>

    <div id="camera-modal" class="flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm glass rounded-[2.5rem] overflow-hidden relative">
            <video id="video" class="w-full bg-black h-80 object-cover" autoplay playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div class="p-6 text-center">
                <p class="text-[10px] text-amber-500 font-bold uppercase mb-4">Ambil Foto Area Kerja</p>
                <div class="flex gap-4">
                    <button onclick="closeCamera()" class="flex-1 py-4 bg-slate-800 rounded-2xl text-xs font-bold">Batal</button>
                    <button onclick="takeSnap()" class="flex-1 py-4 btn-gold rounded-2xl text-xs font-black text-slate-900 bg-amber-500">JEPRET</button>
                </div>
            </div>
        </div>
    </div>

    <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-4">Riwayat Terakhir</h3>
    <div id="absensi-list" class="space-y-3">
        <div class="text-center py-10 opacity-20 italic text-xs">Memuat data...</div>
    </div>

    <script>
        const API_URL = "URL_APPS_SCRIPT_KAMU";
        let currentAction = "";
        let stream = null;

        // 1. Live Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('live-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);

        // 2. Camera Logic
        async function openCamera(action) {
            currentAction = action;
            document.getElementById('camera-modal').style.display = 'flex';
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            document.getElementById('video').srcObject = stream;
        }

        function closeCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('camera-modal').style.display = 'none';
        }

        async function takeSnap() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            
            // Resize ke ukuran kecil biar gak lemot (300x400)
            canvas.width = 300;
            canvas.height = 400;
            context.drawImage(video, 0, 0, 300, 400);
            
            const photoBase64 = canvas.toDataURL('image/jpeg', 0.6); // Compress 60%
            closeCamera();
            submitAbsen(photoBase64);
        }

        // 3. Submit Data
        async function submitAbsen(foto) {
            const now = new Date();
            const jamAktual = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const tgl = now.toISOString().split('T')[0];
            
            const payload = {
                target: "absensi",
                data: [
                    Date.now(),           // ID
                    tgl,                  // Tanggal
                    jamAktual,            // JAM (Ini yang kita fix)
                    currentAction,        // Status (MASUK/PULANG)
                    "Admin",              // Nama
                    foto                  // Bukti Foto Base64
                ]
            };

            alert("⏳ Sedang mencatat absen...");
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("✅ Absen Berhasil!");
            loadHistory();
        }

        async function loadHistory() {
            const resp = await fetch(API_URL + "?page=absensi");
            const data = await resp.json();
            const list = document.getElementById('absensi-list');
            list.innerHTML = '';
            
            data.slice(-5).reverse().forEach(a => {
                const color = a.status === 'MASUK' ? 'emerald' : 'rose';
                list.innerHTML += `
                    <div class="glass p-5 rounded-3xl border-l-4 border-${color}-500 flex justify-between items-center">
                        <div>
                            <p class="text-[8px] text-gray-500 font-bold uppercase">${a.tanggal}</p>
                            <h4 class="text-xs font-black">${a.status}</h4>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-${color}-400">${a.jam}</p>
                            ${a.foto ? `<span class="text-[8px] text-amber-500 font-bold">📸 BUKTI ADA</span>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        window.onload = () => { updateClock(); loadHistory(); };
    </script>
</body>
</html>
