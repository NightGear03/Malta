<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" type="image/png" href="https://i.imgur.com/h3D0nVP.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/h3D0nVP.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fbbf24">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Vape - Dashboard Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; }
        .gold-text { color: #fbbf24; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(251, 191, 36, 0.1); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; border-top: 1px solid #1e293b; display: flex; justify-content: space-around; padding: 12px 0 24px 0; z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #64748b; text-decoration: none; }
        .nav-item.active { color: #fbbf24; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        /* Fix modal agar tersembunyi default */
        #items-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-32">

    <main class="p-6">
        <div class="flex justify-between items-center mb-6 mt-2">
            <div>
                <h2 class="text-2xl font-extrabold tracking-tight italic">MALTA <span class="gold-text">VAPE</span></h2>
                <input type="date" id="date-filter" onchange="loadHomeData()" class="bg-transparent text-amber-500 font-bold text-[10px] uppercase tracking-widest outline-none border-none">
            </div>
            <div class="w-12 h-12 rounded-2xl bg-slate-900 border border-amber-500/20 flex items-center justify-center text-xl shadow-lg shadow-amber-500/5">👑</div>
        </div>

        <div class="bg-gradient-to-br from-slate-900 via-slate-900 to-amber-900/20 p-8 rounded-[2.5rem] border border-amber-500/20 mb-6 relative overflow-hidden shadow-2xl">
            <div class="absolute -right-6 -top-6 w-32 h-32 bg-amber-500/10 rounded-full blur-3xl"></div>
            <p class="text-gray-400 text-[9px] uppercase font-black tracking-widest mb-1">Total Omzet</p>
            <h3 class="text-4xl font-black gold-text tracking-tighter" id="omzet-tampil">Rp 0</h3>
            <div class="flex gap-4 mt-6 pt-4 border-t border-white/5">
                <div class="flex-1">
                    <p class="text-gray-500 text-[8px] font-bold uppercase mb-1 tracking-widest">Pengeluaran</p>
                    <p id="total-keluar" class="text-rose-400 font-black text-sm">Rp 0</p>
                </div>
                <div class="flex-1">
                    <p class="text-gray-500 text-[8px] font-bold uppercase mb-1 tracking-widest">Net Saldo</p>
                    <p id="total-net" class="text-emerald-400 font-black text-sm">Rp 0</p>
                </div>
            </div>
        </div>

        <button onclick="openItemsModal()" class="w-full py-5 mb-8 bg-amber-500/10 border border-amber-500/20 rounded-[2rem] text-amber-500 font-black text-[10px] uppercase tracking-[0.2em] active:scale-95 transition-all">
            📦 Barang Keluar Hari Ini
        </button>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <a href="grafik.html" class="glass p-6 rounded-[2rem] flex flex-col items-center">
                <div class="text-2xl mb-2">📈</div>
                <p class="font-bold text-[10px] uppercase tracking-tighter">Analisa</p>
            </a>
            <a href="inventory.html" class="glass p-6 rounded-[2rem] flex flex-col items-center relative">
                <div id="low-stock-count" class="absolute -top-1 -right-1 bg-rose-600 text-[8px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-slate-900 hidden">0</div>
                <div class="text-2xl mb-2">📦</div>
                <p class="font-bold text-[10px] uppercase tracking-tighter">Stok</p>
            </a>
        </div>

        <div class="glass p-6 rounded-[2.5rem]">
            <h4 class="font-black text-[9px] uppercase text-gray-500 tracking-widest mb-6 flex justify-between">
                Aktivitas Terakhir <span class="text-amber-500 animate-pulse">● LIVE</span>
            </h4>
            <div class="space-y-5" id="recent-activity">
                <div class="text-center py-4 text-[10px] text-gray-600 italic">Syncing...</div>
            </div>
        </div>
    </main>

    <div id="items-modal" class="flex flex-col p-6 overflow-hidden">
        <div class="flex justify-between items-center mb-8 mt-4">
            <h2 class="text-xl font-black gold-text uppercase italic tracking-tighter">Laporan Barang</h2>
            <button onclick="closeItemsModal()" class="w-12 h-12 glass rounded-full flex items-center justify-center text-xl shadow-xl">✕</button>
        </div>
        <div id="items-report-list" class="space-y-4 overflow-y-auto pb-20 no-scrollbar"></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="font-bold">Beranda</span>
        </a>
        <a href="kasir.html" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <span class="font-bold">Kasir</span>
        </a>
        <a href="inventory.html" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M20 13H4v-2h16v2M7 19h10v-2H7v2M3 5v2h18V5H3z"/></svg>
            <span class="font-bold">Item</span>
        </a>
        <a href="absensi.html" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm.5 13H11v-6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            <span class="font-bold">Absen</span>
        </a>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzVgkW4y0ke_7AFPiALhnoMN577ixX2eZSaxmucn-amXbRUoZ3xi4hSZZ54vmT6abEm/exec";
        let masterItems = [], currentSales = [];

        async function loadHomeData() {
            const filterDate = document.getElementById('date-filter').value;
            const targetTgl = filterDate.split('-').reverse().map(num => parseInt(num)).join('/');

            try {
                const [pResp, iResp, exResp] = await Promise.all([
                    fetch(API_URL + "?page=penjualan"),
                    fetch(API_URL + "?page=items"),
                    fetch(API_URL + "?page=pengeluaran")
                ]);

                currentSales = await pResp.json();
                masterItems = await iResp.json();
                const expenses = await exResp.json();

                const filteredSales = currentSales.filter(s => s.tanggal.includes(targetTgl));
                const totalOmzet = filteredSales.reduce((sum, s) => sum + (parseInt(s.total_akhir) || 0), 0);
                const filteredEx = expenses.filter(e => e.tanggal.includes(targetTgl));
                const totalKeluar = filteredEx.reduce((sum, e) => sum + (parseInt(e.jumlah) || 0), 0);

                document.getElementById('omzet-tampil').innerText = "Rp " + totalOmzet.toLocaleString();
                document.getElementById('total-keluar').innerText = "Rp " + totalKeluar.toLocaleString();
                document.getElementById('total-net').innerText = "Rp " + (totalOmzet - totalKeluar).toLocaleString();

                const low = masterItems.filter(i => parseInt(i.stok) < 5);
                const badge = document.getElementById('low-stock-count');
                if(low.length > 0) { badge.innerText = low.length; badge.classList.remove('hidden'); }
                else { badge.classList.add('hidden'); }

                const actContainer = document.getElementById('recent-activity');
                actContainer.innerHTML = '';
                filteredSales.slice(-5).reverse().forEach(s => {
                    const timePart = s.tanggal.includes(' ') ? s.tanggal.split(' ')[1] : "--:--";
                    actContainer.innerHTML += `
                        <div class="flex items-center justify-between border-b border-white/5 pb-4">
                            <div class="w-2/3">
                                <p class="text-[10px] font-bold truncate">${s.items}</p>
                                <p class="text-[8px] text-gray-500 uppercase font-black">${timePart} • ${s.metode_bayar}</p>
                            </div>
                            <p class="text-[10px] font-black text-emerald-500">+Rp ${(s.total_akhir/1000).toFixed(0)}k</p>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        function openItemsModal() {
            document.getElementById('items-modal').style.display = 'flex';
            const filterDate = document.getElementById('date-filter').value;
            const targetTgl = filterDate.split('-').reverse().map(num => parseInt(num)).join('/');
            
            const filteredSales = currentSales.filter(s => s.tanggal.includes(targetTgl));
            const listContainer = document.getElementById('items-report-list');
            listContainer.innerHTML = '';

            if(filteredSales.length === 0) {
                listContainer.innerHTML = '<div class="text-center py-20 opacity-20 italic text-[10px]">No sales today</div>';
                return;
            }

            filteredSales.forEach(s => {
                const itemArray = s.items.split(', ');
                itemArray.forEach(entry => {
                    const match = entry.match(/(.+) \((\d+)\)/);
                    if(match) {
                        const nama = match[1];
                        const qty = match[2];
                        const info = masterItems.find(i => i.nama === nama) || {};
                        listContainer.innerHTML += `
                            <div class="glass p-6 rounded-[2rem] border-l-4 border-amber-500">
                                <div class="flex justify-between items-start mb-3">
                                    <div class="w-3/4">
                                        <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">${info.merk || 'No Brand'} • ${info.kategori || 'N/A'}</p>
                                        <h4 class="text-[11px] font-black leading-tight">${nama}</h4>
                                    </div>
                                    <div class="text-right"><p class="text-[10px] font-black gold-text">${qty} Pcs</p></div>
                                </div>
                                <div class="flex justify-between items-center pt-3 border-t border-white/5">
                                    <p class="text-[9px] text-gray-400 font-bold">Price: Rp ${parseInt(info.harga || 0).toLocaleString()}</p>
                                    <p class="text-[9px] text-rose-400 font-bold">Disc: Rp ${parseInt(s.total_diskon || 0).toLocaleString()}</p>
                                </div>
                            </div>`;
                    }
                });
            });
        }

        function closeItemsModal() { document.getElementById('items-modal').style.display = 'none'; }

        window.onload = () => {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            document.getElementById('date-filter').value = new Date(now - offset).toISOString().split('T')[0];
            loadHomeData();
        };
    </script>
</body>
</html>
