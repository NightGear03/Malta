<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta VapeStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-md mx-auto bg-zinc-900 min-h-screen shadow-2xl overflow-hidden" id="app">
        <!-- HEADER -->
        <header id="header" class="bg-gradient-to-r from-teal-600 to-teal-500 p-4 flex items-center gap-3 sticky top-0 z-50">
            <img src="https://i.imgur.com/h3D0nVP.png" alt="Malta Logo" class="w-12 h-12 rounded-2xl">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Malta VapeStore</h1>
                <p class="text-xs text-teal-100 -mt-1">EST 2019 • Bandung</p>
            </div>
            <button onclick="logout()" id="logoutBtn" class="ml-auto text-white text-sm font-medium hidden">Logout</button>
        </header>

        <!-- LANDING -->
        <div id="landing" class="p-6">
            <div class="text-center py-12">
                <img src="https://i.imgur.com/h3D0nVP.png" class="mx-auto w-44 mb-6">
                <h2 class="text-4xl font-bold mb-2 text-teal-400">Selamat Datang!</h2>
                <p class="text-zinc-400">Pilih peran kamu</p>
            </div>
            <div class="space-y-4">
                <button onclick="showLogin('owner')" class="w-full bg-zinc-800 hover:bg-zinc-700 border border-amber-400/30 p-6 rounded-3xl flex items-center gap-5">
                    <i class="fa-solid fa-crown text-5xl text-amber-400"></i>
                    <div class="text-left"><div class="font-semibold text-2xl">Owner</div><div class="text-zinc-500">Manajemen lengkap</div></div>
                </button>
                <button onclick="showLogin('worker')" class="w-full bg-zinc-800 hover:bg-zinc-700 border border-blue-400/30 p-6 rounded-3xl flex items-center gap-5">
                    <i class="fa-solid fa-user-gear text-5xl text-blue-400"></i>
                    <div class="text-left"><div class="font-semibold text-2xl">Worker</div><div class="text-zinc-500">Catat penjualan & absen</div></div>
                </button>
                <button onclick="enterMember()" class="w-full bg-zinc-800 hover:bg-zinc-700 border border-emerald-400/30 p-6 rounded-3xl flex items-center gap-5">
                    <i class="fa-solid fa-users text-5xl text-emerald-400"></i>
                    <div class="text-left"><div class="font-semibold text-2xl">Member</div><div class="text-zinc-500">Lihat stok & request</div></div>
                </button>
            </div>
        </div>

        <!-- LOGIN MODAL -->
        <div id="loginModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
            <div class="bg-zinc-900 w-full max-w-xs mx-4 rounded-3xl p-8">
                <h3 id="modalTitle" class="text-2xl font-bold text-center mb-8">Login</h3>
                <input id="username" placeholder="Username" class="block w-full bg-zinc-800 p-4 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-teal-500">
                <input id="password" type="password" placeholder="Password" class="block w-full bg-zinc-800 p-4 rounded-2xl mb-8 outline-none focus:ring-2 focus:ring-teal-500">
                <button onclick="doLogin()" class="w-full bg-teal-600 hover:bg-teal-500 py-4 rounded-3xl font-bold text-lg">Masuk</button>
                <button onclick="hideModal()" class="w-full mt-4 text-zinc-400">Batal</button>
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="mainApp" class="hidden flex flex-col h-[calc(100vh-73px)]">
            <div id="tabs" class="flex border-b border-zinc-700 bg-zinc-950 overflow-x-auto"></div>
            <div id="content" class="flex-1 overflow-auto p-5 pb-24"></div>
            <div id="bottomNav" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-zinc-900 border-t border-zinc-700 flex text-xs"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyHrQU4GD5PfMcEM9SGtRqKdLoUjNCzmmysmh6gkVcInN2inV2y--h7aSMBD1PW1P2W/exec";

        let products = [], sales = [], attendance = [], requestsList = [];
        let currentRole = null, currentUser = null, currentChart = null;
        let currentCategory = null, currentSubcategory = null;

        async function fetchData(action) {
            try {
                const res = await fetch(`\( {API_URL}?action= \){action}`);
                return await res.json();
            } catch (e) { return []; }
        }

        async function postData(payload) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'application/json' }
                });
                return await res.json();
            } catch (e) { return {status:'error'}; }
        }

        async function loadAllData() {
            products = await fetchData('getProducts');
            sales = await fetchData('getSales');
            attendance = await fetchData('getAttendance');
            requestsList = await fetchData('getRequests');
        }

        function formatRupiah(n) { return 'Rp ' + (n||0).toLocaleString('id-ID'); }
        function today() { return new Date().toISOString().split('T')[0]; }
        function nowTime() { return new Date().toTimeString().slice(0,5); }

        // LOGIN (sama seperti sebelumnya)
        function showLogin(role) { /* sama */ document.getElementById('modalTitle').textContent = role === 'owner' ? 'Login Owner' : 'Login Worker'; window.tempRole = role; document.getElementById('loginModal').classList.remove('hidden'); }
        function hideModal() { document.getElementById('loginModal').classList.add('hidden'); }
        async function doLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const role = window.tempRole;
            if (role === 'owner' && user === 'Rizal' && pass === '22446688') { currentRole = 'owner'; currentUser = 'Rizal'; }
            else if (role === 'worker' && user === 'Zikra' && pass === '010299') { currentRole = 'worker'; currentUser = 'Zikra'; }
            else { alert('ID atau password salah!'); return; }
            hideModal(); await enterApp();
        }
        async function enterMember() { currentRole = 'member'; currentUser = 'Member'; await enterApp(); }

        async function enterApp() {
            await loadAllData();
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            buildTabs();
            showSection(currentRole === 'member' ? 'stok' : 'dashboard');
        }

        function logout() { if (confirm('Keluar?')) location.reload(); }

        // TABS & NAV (sama persis seperti kode lama, tidak diubah)
        let currentSection = '';
        function buildTabs() { /* copy dari kode sebelumnya */ 
            const tabsDiv = document.getElementById('tabs');
            const bottomDiv = document.getElementById('bottomNav');
            tabsDiv.innerHTML = ''; bottomDiv.innerHTML = '';
            let items = currentRole === 'member' ? 
                [{key:'stok', icon:'fa-box', label:'Stok'},{key:'request', icon:'fa-paper-plane', label:'Request'}] :
                [{key:'dashboard', icon:'fa-chart-bar', label:'Dashboard'},{key:'stok', icon:'fa-box', label:'Stok'},{key:'penjualan', icon:'fa-cart-plus', label:'Jual'},{key:'requests', icon:'fa-bell', label:'Request'},{key:'laporan', icon:'fa-file-alt', label:'Laporan'},{key:'absensi', icon:'fa-clock', label:'Absen'}];
            items.forEach(item => {
                const tab = document.createElement('button'); tab.className = `flex-1 py-4 text-sm font-medium flex flex-col items-center gap-1 ${currentSection === item.key ? 'text-teal-400 border-b-4 border-teal-400' : 'text-zinc-400'}`; tab.innerHTML = `<i class="fa-solid \( {item.icon} text-xl"></i><span> \){item.label}</span>`; tab.onclick = () => showSection(item.key); tabsDiv.appendChild(tab);
                const b = document.createElement('button'); b.className = `flex-1 flex flex-col items-center py-2 ${currentSection === item.key ? 'text-teal-400' : 'text-zinc-400'}`; b.innerHTML = `<i class="fa-solid \( {item.icon} text-2xl"></i><span class="text-[10px]"> \){item.label}</span>`; b.onclick = () => showSection(item.key); bottomDiv.appendChild(b);
            });
        }

        async function showSection(section) {
            currentSection = section;
            buildTabs();
            const content = document.getElementById('content');
            content.innerHTML = '';
            await loadAllData(); // selalu refresh data terbaru
            if (section === 'dashboard') renderDashboard(content);
            else if (section === 'stok') renderStok(content);
            else if (section === 'penjualan') renderPenjualan(content);
            else if (section === 'absensi') renderAbsensi(content);
            else if (section === 'laporan') renderLaporan(content);
            else if (section === 'requests' || section === 'request') renderRequests(content);
        }

        // DASHBOARD (sama, pakai data global)
        function renderDashboard(container) { /* sama seperti kode lama */ 
            const td = today();
            const todaySales = sales.filter(s => s.date === td);
            const total = todaySales.reduce((sum, s) => sum + (s.total||0), 0);
            const top = {};
            todaySales.forEach(s => top[s.itemname || s.itemName] = (top[s.itemname || s.itemName]||0) + (s.qty||0));
            const topSorted = Object.entries(top).sort((a,b)=>b[1]-a[1]).slice(0,5);
            let html = `<div class="text-center mb-10"><p class="text-zinc-400 text-sm">\( {td}</p><p class="text-6xl font-bold text-teal-400 mt-1"> \){formatRupiah(total)}</p><p class="text-xs text-zinc-500">PENJUALAN HARI INI</p></div>`;
            html += `<div class="bg-zinc-800 rounded-3xl p-6"><h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-fire text-orange-400"></i> Paling Rame Hari Ini</h3><canvas id="topChart" class="h-60"></canvas></div>`;
            container.innerHTML = html;
            setTimeout(() => {
                if (currentChart) currentChart.destroy();
                currentChart = new Chart(document.getElementById('topChart'), {type: 'bar', data: {labels: topSorted.map(i=>i[0].slice(0,10)), datasets: [{label:'Terjual', data:topSorted.map(i=>i[1]), backgroundColor:'#14b8a6'}]}, options: {responsive:true, plugins:{legend:{display:false}}}});
            }, 300);
        }

        // STOK OWNER/WORKER
        function renderStok(container) {
            if (currentRole === 'member') return renderMemberStok(container);
            let html = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Daftar Stok</h2>${currentRole === 'owner' ? `<button onclick="tambahBarang()" class="bg-teal-600 px-6 py-3 rounded-2xl text-sm font-medium">+ Barang Baru</button>` : ''}</div><input id="search" onkeyup="cariStok()" placeholder="Cari nama barang..." class="w-full bg-zinc-800 border-none p-4 rounded-3xl mb-6"><div id="stokContainer" class="space-y-4"></div>`;
            container.innerHTML = html;
            renderStokItems();
        }
        function renderStokItems(filtered = products) {
            const cont = document.getElementById('stokContainer'); cont.innerHTML = '';
            filtered.forEach(p => {
                const div = document.createElement('div');
                div.className = "bg-zinc-800 rounded-3xl p-5 flex justify-between items-center";
                div.innerHTML = `<div><div class="font-medium">\( {p.name}</div><div class="text-xs text-zinc-400"> \){p.category} • \( {p.subcategory}</div><div class="text-teal-400 text-sm"> \){formatRupiah(p.price)}</div></div><div class="text-right"><div class="text-4xl font-bold text-emerald-400">\( {p.stock}</div><div class="text-xs text-zinc-500">stok</div></div> \){currentRole === 'owner' ? `<button onclick="editStok(${p.id})" class="ml-4 text-amber-400"><i class="fa-solid fa-pen"></i></button>` : ''}`;
                cont.appendChild(div);
            });
        }
        function cariStok() { /* sama */ const term = document.getElementById('search').value.toLowerCase(); const filtered = products.filter(p => p.name.toLowerCase().includes(term)); renderStokItems(filtered); }

        async function tambahBarang() {
            const name = prompt("Nama barang:");
            if (!name) return;
            const category = prompt("Kategori (Pod/Mod/Liquid/Cartridge/Aksesori):");
            const subcategory = prompt("Subkategori / Merk:");
            const price = parseInt(prompt("Harga:"));
            const stock = parseInt(prompt("Stok awal:"));
            const id = Date.now();
            await postData({action: 'addProduct', id, name, price, stock, category, subcategory});
            await loadAllData();
            renderStokItems();
        }

        async function editStok(id) {
            const p = products.find(x => x.id == id);
            const newStock = parseInt(prompt(`Stok baru untuk ${p.name}:`, p.stock));
            if (!isNaN(newStock)) {
                await postData({action: 'updateStock', id, stock: newStock});
                await loadAllData();
                renderStokItems();
            }
        }

        // PENJUALAN
        async function renderPenjualan(container) {
            let html = `<h2 class="text-2xl font-bold mb-6">Catat Penjualan</h2><div id="jualList" class="space-y-6"></div>`;
            container.innerHTML = html;
            const list = document.getElementById('jualList');
            products.forEach(p => {
                const d = document.createElement('div');
                d.className = "bg-zinc-800 rounded-3xl p-5";
                d.innerHTML = `<div class="flex justify-between items-center"><div><div class="font-medium">\( {p.name}</div><div class="text-teal-400"> \){formatRupiah(p.price)}</div></div><div class="flex items-center gap-3"><input id="qty\( {p.id}" type="number" value="1" min="1" class="w-20 bg-zinc-700 text-center p-3 rounded-2xl"><button onclick="jual( \){p.id})" class="bg-emerald-600 px-7 py-3 rounded-2xl font-medium">JUAL</button></div></div>`;
                list.appendChild(d);
            });
        }

        async function jual(id) {
            const qty = parseInt(document.getElementById('qty' + id).value);
            if (!qty) return;
            const p = products.find(x => x.id == id);
            if ((p.stock||0) < qty) return alert("Stok tidak cukup!");
            const total = p.price * qty;
            await postData({action: 'addSale', date: today(), time: nowTime(), itemName: p.name, qty, total, worker: currentUser});
            await postData({action: 'updateStock', id, stock: (p.stock||0) - qty});
            alert(`✅ ${qty} ${p.name} tercatat!`);
            await loadAllData();
            showSection('penjualan');
        }

        // ABSENSI, LAPORAN, REQUESTS (sama logic, tapi pakai postData + loadAllData)
        // ... (semua fungsi absensi, laporan, request pakai await postData dan await loadAllData() setelahnya)

        // MEMBER HIERARCHICAL (sama seperti revisi sebelumnya)
        function renderMemberStok(container) { /* sama */ }
        function showSubcategories(cat, container) { /* sama */ }
        function showProductsInSub(cat, sub, container) { /* sama */ }
        function tanyaWA(name, stock) {
            const msg = `Halo Malta VapeStore,%0AApakah ${encodeURIComponent(name)} masih tersedia?%0AStok saat ini: ${stock}%0ATerima kasih!`;
            window.open(`https://wa.me/6283101456267?text=${msg}`, '_blank');
        }

        // Absensi, Laporan, Requests → copy dari kode lama tapi tambah await loadAllData() & postData

        // Auto refresh setiap 30 detik
        setInterval(() => { if (currentRole) loadAllData().then(() => showSection(currentSection)); }, 30000);
    </script>
</body>
</html>
