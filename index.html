<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Vape - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; }
        .gold-text { color: #fbbf24; }
        .btn-gold { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(251, 191, 36, 0.1); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; border-top: 1px solid #1e293b; display: flex; justify-content: space-around; padding: 12px 0 24px 0; z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #64748b; text-decoration: none; }
        .nav-item.active { color: #fbbf24; }
    </style>
</head>
<body class="pb-32">

    <main class="p-6">
        <div class="flex justify-between items-center mb-8 mt-2">
            <div>
                <h2 class="text-2xl font-extrabold tracking-tight">Halo, <span class="gold-text">Admin!</span></h2>
                <p id="tgl-skrg" class="text-gray-500 text-[10px] uppercase tracking-widest font-bold"></p>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-slate-900 border border-amber-500/20 flex items-center justify-center text-xl shadow-lg shadow-amber-500/5">👑</div>
        </div>

        <div class="bg-gradient-to-br from-slate-900 via-slate-900 to-amber-900/20 p-8 rounded-[2.5rem] border border-amber-500/20 mb-8 relative overflow-hidden shadow-2xl">
            <div class="absolute -right-6 -top-6 w-32 h-32 bg-amber-500/10 rounded-full blur-3xl"></div>
            <p class="text-gray-400 text-[9px] uppercase font-black tracking-[0.2em] mb-2">Penjualan Hari Ini</p>
            <h3 class="text-4xl font-black gold-text mb-4 tracking-tighter" id="omzet-hari-ini">Rp 0</h3>
            <div class="flex items-center gap-2">
                <span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full font-bold">✨ Realtime Update</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <a href="grafik.html" class="glass p-6 rounded-[2rem] flex flex-col items-center text-center">
                <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-2xl mb-3">📈</div>
                <p class="font-bold text-xs uppercase tracking-tight">Analisa</p>
            </a>
            <a href="inventory.html" class="glass p-6 rounded-[2rem] flex flex-col items-center text-center">
                <div id="low-stock-count" class="absolute -top-1 -right-1 bg-rose-600 text-[8px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-slate-900 hidden">0</div>
                <div class="w-12 h-12 bg-rose-500/10 rounded-2xl flex items-center justify-center text-2xl mb-3">📦</div>
                <p class="font-bold text-xs uppercase tracking-tight">Stok Item</p>
            </a>
        </div>

        <div class="glass p-6 rounded-[2.5rem]">
            <h4 class="font-black text-[10px] uppercase text-gray-500 tracking-widest mb-6 flex justify-between">
                Aktivitas Terakhir <span class="text-amber-500">Live</span>
            </h4>
            <div class="space-y-6" id="recent-activity">
                <div class="text-center py-4 text-xs text-gray-600 italic">Menyinkronkan aktivitas...</div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="font-bold">Beranda</span>
        </a>
        <a href="kasir.html" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <span class="font-bold">Kasir</span>
        </a>
        <a href="inventory.html" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M20 13H4v-2h16v2M7 19h10v-2H7v2M3 5v2h18V5H3z"/></svg>
            <span class="font-bold">Item</span>
        </a>
        <a href="absensi.html" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm.5 13H11v-6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            <span class="font-bold">Absensi</span>
        </a>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzVgkW4y0ke_7AFPiALhnoMN577ixX2eZSaxmucn-amXbRUoZ3xi4hSZZ54vmT6abEm/exec";

        async function loadHomeData() {
            try {
                const [pResp, iResp] = await Promise.all([
                    fetch(API_URL + "?page=penjualan"),
                    fetch(API_URL + "?page=items")
                ]);
                const sales = await pResp.json();
                const items = await iResp.json();
                
                // 1. Omzet Hari Ini
                const today = new Date().toISOString().split('T')[0];
                const omzet = sales.filter(s => s.tanggal.startsWith(today)).reduce((s,i) => s + i.total_akhir, 0);
                document.getElementById('omzet-hari-ini').innerText = "Rp " + omzet.toLocaleString();

                // 2. Low Stock Alert
                const low = items.filter(i => parseInt(i.stok) < 5);
                if(low.length > 0) {
                    const badge = document.getElementById('low-stock-count');
                    badge.innerText = low.length;
                    badge.classList.remove('hidden');
                }

                // 3. Aktivitas Terakhir (Ambil 3 terakhir)
                const container = document.getElementById('recent-activity');
                container.innerHTML = '';
                sales.slice(-3).reverse().forEach(s => {
                    container.innerHTML += `
                        <div class="flex items-center justify-between border-b border-white/5 pb-4">
                            <div class="w-2/3">
                                <p class="text-xs font-bold truncate">${s.items}</p>
                                <p class="text-[9px] text-gray-500 uppercase">${new Date(s.tanggal).toLocaleTimeString()}</p>
                            </div>
                            <p class="text-xs font-black text-emerald-500">+Rp ${(s.total_akhir/1000)}k</p>
                        </div>
                    `;
                });
            } catch (e) { console.error(e); }
        }

        window.onload = () => {
            loadHomeData();
            document.getElementById('tgl-skrg').innerText = new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric'});
        };
    </script>
</body>
</html>
